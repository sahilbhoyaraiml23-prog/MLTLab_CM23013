<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Image Classifier</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    text-align: center;
    padding: 20px;
}

.container {
    background: rgba(255, 255, 255, 0.1);
    padding: 30px;
    border-radius: 20px;
    max-width: 500px;
    margin: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
}

h1 {
    margin-bottom: 10px;
}

input {
    margin-top: 20px;
}

img {
    margin-top: 20px;
    border-radius: 15px;
    width: 100%;
    max-height: 300px;
    object-fit: cover;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    background: #ff7b00;
    color: white;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff5500;
    transform: scale(1.05);
}

.result-box {
    margin-top: 20px;
    padding: 15px;
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    font-size: 18px;
}

.loader {
    display: none;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🤖 AI Image Classifier</h1>
    <p>Upload an image and let MobileNet predict it!</p>

    <input type="file" id="imageUpload" />

    <img id="preview" />

    <div class="loader" id="loader">🔄 Analyzing...</div>

    <div class="result-box" id="result">
        Prediction will appear here
    </div>
</div>

<!-- TensorFlow -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<script src="script.js"></script>

</body>
</html>
